performer as listener ... a time for collective action!"},{"id":38,"slug":"toma-aire","title":"Toma Aire","oneliner":"for flute, to be performed in one breath","description":"sei solo…\n\n…ma almeno è un solo respiro!","audio":null,"pdf":null,"cues":[],"audioId":"wc-a38","one":"for flute, to be performed in one breath","onelinerEffective":"for flute, to be performed in one breath","descriptionEffective":"sei solo…\n\n…ma almeno è un solo respiro!"},{"id":39,"slug":"socorro","title":"socorro","oneliner":"for soprano saxophone","description":"commissioned by Jade Deatherage","audio":null,"pdf":null,"cues":[],"audioId":"wc-a39","one":"for soprano saxophone","onelinerEffective":"for soprano saxophone","descriptionEffective":"commissioned by Jade Deatherage"},{"id":40,"slug":"gems","title":"GEMS","oneliner":"twelve theatrics for any soloist","description":"GEMS is a set of twelve miniatures that explore theatrical elements of the contemporary musical stage performance practice. Each miniature, a different “gem” in its own regard, delves into the more uncomfortable, comical, and puzzling aspects of being on stage (and, as a corollary, being an audience member).\n\nThese miniatures may be performed all together, as one set of actions (in which case movement titles are not encouraged for programming), or they may be used to bookend other repertoire for a performance.","audio":null,"pdf":null,"cues":[],"audioId":"wc-a40","one":"twelve theatrics for any soloist","onelinerEffective":"twelve theatrics for any soloist","descriptionEffective":"GEMS is a set of twelve miniatures that explore theatrical elements of the contemporary musical stage performance practice. Each miniature, a different “gem” in its own regard, delves into the more uncomfortable, comical, and puzzling aspects of being on stage (and, as a corollary, being an audience member).\n\nThese miniatures may be performed all together, as one set of actions (in which case movement titles are not encouraged for programming), or they may be used to bookend other repertoire for a performance."},{"id":41,"slug":"dynamo","title":"dynamo","oneliner":"for 3 or more players with the help of 2 assistants","description":"dynamo is performed using a physical medium only, and requires a projector, a table and streaming equipment in order to fulfill the roll of the visual assistants and preserve the game-like structure of the piece. a perusal score is available (with no performance license)\n\ndynamo is a suite for any number of players, with the help of two assistants, based on the music, world-building, and game design of popular role-playing video games. the piece is a marriage of music, interactive game design, and visual art: the piece is printed on a 24”x132” tapestry. during a performance of dynamo, the 11-foot tapestry is draped across the stage, dragged over a table which is under either a projector or camera, displaying the music to both the audience and the players. the performers are free to play any cell projected and free to repeat ad libitum, while the assistants are free to drag forward the “world boundary” the players play on at their leisure. each movement explores different tropes of both role-playing video game landscapes and their related soundtracks, as well as different tropes of minimalist and graphic score design.","audio":null,"pdf":null,"cues":[],"audioId":"wc-a41","one":"for 3 or more players with the help of 2 assistants","onelinerEffective":"for 3 or more players with the help of 2 assistants","descriptionEffective":"dynamo is performed using a physical medium only, and requires a projector, a table and streaming equipment in order to fulfill the roll of the visual assistants and preserve the game-like structure of the piece. a perusal score is available (with no performance license)\n\ndynamo is a suite for any number of players, with the help of two assistants, based on the music, world-building, and game design of popular role-playing video games. the piece is a marriage of music, interactive game design, and visual art: the piece is printed on a 24”x132” tapestry. during a performance of dynamo, the 11-foot tapestry is draped across the stage, dragged over a table which is under either a projector or camera, displaying the music to both the audience and the players. the performers are free to play any cell projected and free to repeat ad libitum, while the assistants are free to drag forward the “world boundary” the players play on at their leisure. each movement explores different tropes of both role-playing video game landscapes and their related soundtracks, as well as different tropes of minimalist and graphic score design."},{"id":42,"slug":"prisma","title":"PRISMA: Book of Moves","oneliner":"a suite for theatrical quartet","description":"PRISMA: Book of Moves is an instrumental and theatrical production scored for a theatrical quartet - that is, a group familiar both with that which is musical and that which is dramatic. With instruments strewn about stage as a makeshift set, the troupe sets off to perform. This piece examines the standards of dramaturgical movement and their context within the standard musical practice, using popular tropes of modern horror movies to create the juxtaposition. In doing so, the piece questions the nature of performance (from the dramaturge’s perspective), the initial presentation of the quartet reminiscent of the “in medias res” tropes into which horror movie characters get written. In this way, the quartet’s performance is unexpected to them, as if they just woke up backstage and forced to perform a piece - PRISMA - about optics and colors. That is to say, the group of performers is acting as another group of performers, led on stage to play a piece for the first time, the rest of the surrounding details a mystery.\n\nThe performers set off on their journey, wary to read instructions carefully, but over time, disrespect the music by either failing to execute directions properly, being too scared of messing up, intentionally disregarding risky text, or later, by beating and dismembering the score. Soon enough, however, some of the details surrounding the link between the music and the performers are uncovered… or better yet, brought to life.","audio":null,"pdf":null,"cues":[],"audioId":"wc-a42","one":"a suite for theatrical quartet","onelinerEffective":"a suite for theatrical quartet","descriptionEffective":"PRISMA: Book of Moves is an instrumental and theatrical production scored for a theatrical quartet - that is, a group familiar both with that which is musical and that which is dramatic. With instruments strewn about stage as a makeshift set, the troupe sets off to perform. This piece examines the standards of dramaturgical movement and their context within the standard musical practice, using popular tropes of modern horror movies to create the juxtaposition. In doing so, the piece questions the nature of performance (from the dramaturge’s perspective), the initial presentation of the quartet reminiscent of the “in medias res” tropes into which horror movie characters get written. In this way, the quartet’s performance is unexpected to them, as if they just woke up backstage and forced to perform a piece - PRISMA - about optics and colors. That is to say, the group of performers is acting as another group of performers, led on stage to play a piece for the first time, the rest of the surrounding details a mystery.\n\nThe performers set off on their journey, wary to read instructions carefully, but over time, disrespect the music by either failing to execute directions properly, being too scared of messing up, intentionally disregarding risky text, or later, by beating and dismembering the score. Soon enough, however, some of the details surrounding the link between the music and the performers are uncovered… or better yet, brought to life."},{"id":43,"slug":"meditations-on-change","title":"Meditations on the Nature of Change","oneliner":"concerto for a theatrical percussionist","description":"“What I possess in my consciousness is for me. ‘I’ is this void, the receptacle for anything and everything, that for which everything exists and which stores everything within itself. Every human being is an entire world of representations buried in the night of the ‘I.’ The ‘I’ is thus the universal in which abstraction is made from everything particular, but in which at the same time everything lies shrouded. It is therefore not a merely abstract universality, but a universality that contains everything within itself.”\n\n–G.W.F. Hegel\n\nthis piece was written to satisfy a (both academic and personal) requirement in my senior percussion recital at the University of Central Florida. it was written during a time where i was facing my final semester of my Bachelors and witnessing a metamorphosis of self\n\nthis was, incidentally, also a time where i was at an intersection of philosophies. i had picked up a knack for Hegel, as well as the films of Francois Truffaut, Jacques Tati, and Jean-Luc Godard, but i had also began reading the words of the Buddha. this resulted in an ablation of my “self,” as i saw it. if had earlier presumed that the self does not exist, this presumption was validated by the dialectical theory i had consumed. i reconciled the lack of a self with the unity of community, this piece being an extant listing of my findings, in a self-aware hybrid play/musical performance format.\n\nthe concerto is for solo percussionist, who plays snare drum, zarb, sings, and plays the stage itself, amongst other improvisatory acts. accompanying the soloist is three percussionists, and an actor, who plays the part of “The Self,” a personification and literal embodiment of the concept of a “self.” throughout a prologue, three movements, and an epilogue, the troupe explores change, leaving home (and your legacy thereafter), and identity.\n\n\"we join our performers as they first encounter each other, colleagues and already lifelong friends. they begin a journey through themselves and the world around them\n\nnamely, they explore how relationships define us, and how change affect us all. ...how change can inspire us, deplete us, scare us, temper us, and what it means to will your own change. this, this moment is their meditation... on their nature, our nature.”","audio":null,"pdf":null,"cues":[],"audioId":"wc-a43","one":"concerto for a theatrical percussionist","onelinerEffective":"concerto for a theatrical percussionist","descriptionEffective":"“What I possess in my consciousness is for me. ‘I’ is this void, the receptacle for anything and everything, that for which everything exists and which stores everything within itself. Every human being is an entire world of representations buried in the night of the ‘I.’ The ‘I’ is thus the universal in which abstraction is made from everything particular, but in which at the same time everything lies shrouded. It is therefore not a merely abstract universality, but a universality that contains everything within itself.”\n\n–G.W.F. Hegel\n\nthis piece was written to satisfy a (both academic and personal) requirement in my senior percussion recital at the University of Central Florida. it was written during a time where i was facing my final semester of my Bachelors and witnessing a metamorphosis of self\n\nthis was, incidentally, also a time where i was at an intersection of philosophies. i had picked up a knack for Hegel, as well as the films of Francois Truffaut, Jacques Tati, and Jean-Luc Godard, but i had also began reading the words of the Buddha. this resulted in an ablation of my “self,” as i saw it. if had earlier presumed that the self does not exist, this presumption was validated by the dialectical theory i had consumed. i reconciled the lack of a self with the unity of community, this piece being an extant listing of my findings, in a self-aware hybrid play/musical performance format.\n\nthe concerto is for solo percussionist, who plays snare drum, zarb, sings, and plays the stage itself, amongst other improvisatory acts. accompanying the soloist is three percussionists, and an actor, who plays the part of “The Self,” a personification and literal embodiment of the concept of a “self.” throughout a prologue, three movements, and an epilogue, the troupe explores change, leaving home (and your legacy thereafter), and identity.\n\n\"we join our performers as they first encounter each other, colleagues and already lifelong friends. they begin a journey through themselves and the world around them\n\nnamely, they explore how relationships define us, and how change affect us all. ...how change can inspire us, deplete us, scare us, temper us, and what it means to will your own change. this, this moment is their meditation... on their nature, our nature.”"},{"id":44,"slug":"synchrony","title":"Synchrony: A Symphony of Theatrics","oneliner":"for any large group","description":"Synchrony is a symphony for a large group consisting of any instruments and consorts, of any size between 12 and 50 members. The piece takes its name from the orbital, atomic, mechanical, and otherwise natural phenomena observed to move in synchronized behavior (such examples include the synchronization of metronomes on a suspended table, the rings of Saturn, the quantum synchrony of “phase oscillators” in the field of quantum physics).\n\nThe first movement is focused on species of fireflies that glow in general synchrony. Like the fireflies, players - using theatrics - communicate to each other over time, multiple vectors gradually coming into phase with each other. Over the course of the rest of the symphony, similar structures of chaos and subsequent phase alignment are explored, with differing initial conditions.","audio":null,"pdf":null,"cues":[],"audioId":"wc-a44","one":"for any large group","onelinerEffective":"for any large group","descriptionEffective":"Synchrony is a symphony for a large group consisting of any instruments and consorts, of any size between 12 and 50 members. The piece takes its name from the orbital, atomic, mechanical, and otherwise natural phenomena observed to move in synchronized behavior (such examples include the synchronization of metronomes on a suspended table, the rings of Saturn, the quantum synchrony of “phase oscillators” in the field of quantum physics).\n\nThe first movement is focused on species of fireflies that glow in general synchrony. Like the fireflies, players - using theatrics - communicate to each other over time, multiple vectors gradually coming into phase with each other. Over the course of the rest of the symphony, similar structures of chaos and subsequent phase alignment are explored, with differing initial conditions."},{"id":45,"slug":"ffwl","title":"Films from Wooded Landscapes","oneliner":"for prepared vibraphone and film","description":"the idea for this piece came to me through the acquisition of some video gear. preparing for some future video projects, i took to local forests with friends, capturing moments of awe and interconnection. in a way, this project also came out of longing for a connection with the nature of the greater Orlando area before I left for graduate studies. film needed to be an integral part of the undertaking, as i wanted a perceptible medium to remember the nature that inspired the work. each movement of Films is accompanied by a film à clef - two each with a cherished friend, one on my owncapturing the nature of the cities in which my friends and I live. the music and, especially, the instrumentation, lend a weightless, unanchored quality to the film. overall, both mediums work together to provide the experience which i like to describe as “seeing moving pictures at a gallery” (and at one point, incredibly early on, the “gallery audience” is revealed slightly).","audio":null,"pdf":null,"cues":[],"audioId":"wc-a45","one":"for prepared vibraphone and film","onelinerEffective":"for prepared vibraphone and film","descriptionEffective":"the idea for this piece came to me through the acquisition of some video gear. preparing for some future video projects, i took to local forests with friends, capturing moments of awe and interconnection. in a way, this project also came out of longing for a connection with the nature of the greater Orlando area before I left for graduate studies. film needed to be an integral part of the undertaking, as i wanted a perceptible medium to remember the nature that inspired the work. each movement of Films is accompanied by a film à clef - two each with a cherished friend, one on my owncapturing the nature of the cities in which my friends and I live. the music and, especially, the instrumentation, lend a weightless, unanchored quality to the film. overall, both mediums work together to provide the experience which i like to describe as “seeing moving pictures at a gallery” (and at one point, incredibly early on, the “gallery audience” is revealed slightly)."},{"id":46,"slug":"asaf","title":"A Scene and Fantasy","oneliner":"a solo piece for horn in two parts: first movement is a microtonal introit whose rhythm is derived from the meter of spoken word; second movement is a graphic score.","description":"a scene and fantasy is the title of a poem i wrote in the summer of 2019\n\nit explores the feeling of being in a room with others and suddenly realizing your mind is miles away, coming in and out awareness. in clearer terms: it aims to capture a narrators experience of dissociation, their attempts at pushing themselves back into the scene by noticing the room around them, and the dread they feel when they do finally snap back to their own thoughts and the reality around them. the scene is presented as fantastical snippets of one’s memory from the event, while the fantasy is shown as a scene the narrator dreams at the peak of his dissociative spell.\n\ni found the horn to be a perfect voice for this feeling. it is warm and inviting, but when pushed to the extremes of its lower range, and allowing for some changes in intonation and embouchure, can sound quite discomforting. the text is set to the poem, mostly syllabically, as i want the meter of the poem and the rhythmic notation to work in tandem, and i want the words to guide the character of the piece as well. ultimately, every rhythm but what is marked march-like can and should be up to the performer to match to the meter and character of\n\ni have adorned some notes with arrows, which are to raise or lower the pitch of that note by no more than 50 cents (a quarter-tone), which is to be done by changing the embouchure to suit. as well, there is some graphic notation being employed, which denotes a larger variance of pitch correspondent to the graphic’s location in pitch space.","audio":null,"pdf":null,"cues":[],"audioId":"wc-a46","one":"a solo piece for horn in two parts: first movement is a microtonal introit whose rhythm is derived from the meter of spoken word; second movement is a graphic score.","onelinerEffective":"a solo piece for horn in two parts: first movement is a microtonal introit whose rhythm is derived from the meter of spoken word; second movement is a graphic score.","descriptionEffective":"a scene and fantasy is the title of a poem i wrote in the summer of 2019\n\nit explores the feeling of being in a room with others and suddenly realizing your mind is miles away, coming in and out awareness. in clearer terms: it aims to capture a narrators experience of dissociation, their attempts at pushing themselves back into the scene by noticing the room around them, and the dread they feel when they do finally snap back to their own thoughts and the reality around them. the scene is presented as fantastical snippets of one’s memory from the event, while the fantasy is shown as a scene the narrator dreams at the peak of his dissociative spell.\n\ni found the horn to be a perfect voice for this feeling. it is warm and inviting, but when pushed to the extremes of its lower range, and allowing for some changes in intonation and embouchure, can sound quite discomforting. the text is set to the poem, mostly syllabically, as i want the meter of the poem and the rhythmic notation to work in tandem, and i want the words to guide the character of the piece as well. ultimately, every rhythm but what is marked march-like can and should be up to the performer to match to the meter and character of\n\ni have adorned some notes with arrows, which are to raise or lower the pitch of that note by no more than 50 cents (a quarter-tone), which is to be done by changing the embouchure to suit. as well, there is some graphic notation being employed, which denotes a larger variance of pitch correspondent to the graphic’s location in pitch space."},{"id":47,"slug":"alma","title":"alma mater","oneliner":"for piano and twelve obbligato instruments","description":"this piece was under the working title \"Points of Recursion\" for quite some time during my compositional process. it was a chance for me to really get acquainted with the process of automatic creation, or creating without any forethought or conscious direction. it was also an exploration in the phenomenology of ideas, and the power sharing an idea can have. at its crux, the piece was a celebration of our habits: the human being's fantastic ability to form trends over time based on experiences, the ability to soak up a person or place and form patterns around them. in many ways, we tend to focus on the moments of change, the rare things that happen to us. we look to those to define ourselves, when the habits and menial tasks we do day in and day out - the routes we take home, the sayings we say, the friends we speak to, the foods we eat, the music we listen to - are what actually define the majority of our lives. with all that in mind i sought to create the score and solo in one sitting, and ask the performers not to look though their part until the moment of performance (and even then i would ask not to sight read/read ahead).\n\ni thought something was missing, however, and i knew the title was only temporary. when i finally got all my colleagues together and I was able to listen to a recording, i realized we had all shared similar emotions about our soon-to-be-ending studies at the University of Central Florida. i knew then what was missing was an homage to the sense of community i felt when recording, an undertone of what i experienced in my time at UCF. it is that very community which inspires drive, our habits and tendencies and we accept as our identity. alma mater is a celebration of the constantly evolving habits we form while under the nourishing arm of our community. i dedicated the title in great deference to UCF, and for all i have grown in my undergrad, for all that UCF and i will continue to change.","audio":null,"pdf":null,"cues":[],"audioId":"wc-a47","one":"for piano and twelve obbligato instruments","onelinerEffective":"for piano and twelve obbligato instruments","descriptionEffective":"this piece was under the working title \"Points of Recursion\" for quite some time during my compositional process. it was a chance for me to really get acquainted with the process of automatic creation, or creating without any forethought or conscious direction. it was also an exploration in the phenomenology of ideas, and the power sharing an idea can have. at its crux, the piece was a celebration of our habits: the human being's fantastic ability to form trends over time based on experiences, the ability to soak up a person or place and form patterns around them. in many ways, we tend to focus on the moments of change, the rare things that happen to us. we look to those to define ourselves, when the habits and menial tasks we do day in and day out - the routes we take home, the sayings we say, the friends we speak to, the foods we eat, the music we listen to - are what actually define the majority of our lives. with all that in mind i sought to create the score and solo in one sitting, and ask the performers not to look though their part until the moment of performance (and even then i would ask not to sight read/read ahead).\n\ni thought something was missing, however, and i knew the title was only temporary. when i finally got all my colleagues together and I was able to listen to a recording, i realized we had all shared similar emotions about our soon-to-be-ending studies at the University of Central Florida. i knew then what was missing was an homage to the sense of community i felt when recording, an undertone of what i experienced in my time at UCF. it is that very community which inspires drive, our habits and tendencies and we accept as our identity. alma mater is a celebration of the constantly evolving habits we form while under the nourishing arm of our community. i dedicated the title in great deference to UCF, and for all i have grown in my undergrad, for all that UCF and i will continue to change."}],"pageFollowMaps":{},"config":{"theme":"dark","site":{"firstName":"","lastName":"","fullName":"","copyrightName":"","listLabel":"Works List","subtitle":"","updated":{"mode":"auto","value":""},"links":[{"label":"Home","href":"#","external":false},{"label":"Projects","href":"#","external":false},{"label":"Contact","href":"#","external":false}]}},"source":"user","seeded":false,"count":47,"schemaVersion":"0.2.8","warnings":["Work Rings/Resonators (#2): Oneliner is 239 characters (recommended ≤ 160).","Work EMBODIED MANIFESTATIONS of SPACE in ARTWORKS (#4): Oneliner is 240 characters (recommended ≤ 160).","Work CONSTRUCTIONS (#7): Oneliner is 230 characters (recommended ≤ 160).","Work A Scene and Fantasy (#46): Oneliner is 165 characters (recommended ≤ 160)."]};</script>
