<script id="prae-data" data-source="user" data-count="47">window.__PRAE_DATA__ = {"works":[{"id":1,"slug":"luxnova","title":"Organum quadruplum \"lux nova\"","oneliner":"for dalle de verre and four transducer-amplified pianos","description":"There is a special quality to the kind of light that stained glass emanate which I find fascinating. Unlike traditional art, stained glass is an entanglement of light and material: the art is not the light, nor the glass, but the way the light conditions the space beyond which it occupies (a material declaration reminiscent of Fichtian dialectics or medieval anagogy\n\na sum greater than its parts). In this sense, it is not reflecting light but conditioning it, giving light a quality that makes its invisibilities visible.\n\nAbbot Suger, in a historical reaffirmation of Gothic architecture, described this phenomenon – light passing through glass, which gives body and boundary to the invisible – as lux nova. Medieval builders saw themselves as material theologians: with the technological advancements of the Gothic period allowing for great windows, they could materialize theological truths through illuminatio, making light itself into an art that “corresponds” to celestial œuvres.\n\nAt the center is a dalle de verre slab, mounted to approximate free-free boundary conditions: edge-untethered, supported at nodal points, so the plate speaks in families of modes. As the bow excites the glass (in a lineage that runs from Suger’s Saint-Denis and its program of lux nova to Le Corbusier’s Notre-Dame du Haut with its deep-set colored glazing to Richter’s pixelated Cologne Cathedral window), the bow draws breath, a sort of pneuma. These sounds are transmitted via transducer speakers to a ring of pianos which, even without hammer action, perform as a sort of telephoned organum: polyphony carried at a distance by transduction rather than shared air. In this way, the pianos act as armature and tracery, structures that bind.","audio":null,"pd ors","oneliner":"An album of prepared-piano resonances, captured through body amplification and spatial recording. Building on Amplifications, this release pushes the approach further into density and scale. Vibraphone and multip-percussion played through…","description":"The piano is taken here as a resonant chassis: wood, strings, plate, and air coupled together into one surface. Objects and mutes shape its vocabulary, while contact capture and amplification extend its body outward into the room. What you hear is less a keyboard performance than a field of resonances—sudden excitations, sympathetic vibrations, and sustained blooms that fill and bend the space.\n\nThis album continues the line set out in Amplifications, but with greater intensity. The sound field is closer and more forceful, emphasizing saturation as much as detail. Spatial mixing renders a front stage that stays intelligible, with energy spreading to the sides and rear as the instrument’s frame answers back.\n\nThe result is a spatial document: a listener’s position inside the piano’s acoustic field. Dynamic extremes and tonal shifts emerge from this perspective, giving scale to both the smallest preparation and the largest resonance.","audio":null,"pdf":null,"cues":[],"audioId":"wc-a2","one":"An album of prepared-piano resonances, captured through body amplification and spatial recording. Building on Amplifications, this release pushes the approach further into density and scale. Vibraphone and multip-percussion played through…","onelinerEffective":"An album of prepared-piano resonances, captured through body amplification and spatial recording. Building on Amplifications, this release pushes the approach further into density and scale. Vibraphone and multip-percussion played through…","descriptionEffective":"The piano is taken here as a resonant chassis: wood, strings, plate, and air coupled together into one surface. Objects and mutes shape its vocabulary, while contact capture and amplification extend its body outward into the room. What you hear is less a keyboard performance than a field of resonances—sudden excitations, sympathetic vibrations, and sustained blooms that fill and bend the space.\n\nThis album continues the line set out in Amplifications, but with greater intensity. The sound field is closer and more forceful, emphasizing saturation as much as detail. Spatial mixing renders a front stage that stays intelligible, with energy spreading to the sides and rear as the instrument’s frame answers back.\n\nThe result is a spatial document: a listener’s position inside the piano’s acoustic field. Dynamic extremes and tonal shifts emerge from this perspective, giving scale to both the smallest preparation and the largest resonance."},{"id":3,"slug":"25hundred","title":"25HUNDRED","description":"Bandcamp","audio":null,"pdf":null,"cues":[],"audioId":"wc-a3","onelinerEffective":null,"descriptionEffective":"Bandcamp"},{"id":4,"slug":"embodied-space","title":"EMBODIED MANIFESTATIONS of SPACE in ARTWORKS","oneliner":"Topic Driven Research portfolio (thesis), California Institute of the Arts; 1. CONCERNING HUMAN UNDERSTANDING: The Case for a Radical Constructivist Approach in Music and Aesthetic Theory 2. IMMANENT PRACTICE: The Metaontology of Percussio…","description":"Topic Driven Research Summaries\n\nSebastian Suarez-Solis, DMA Composer-Performer, CalArts\n\nTopic One:\n\n“CONCERNING HUMAN UNDERSTANDING: The Case for a Radical Constructivist Approach in Music and Aesthetic Theory”\n\nThis topic advances a programmatic inquiry into whether second-order cybernetics (SoC) can yield a rigorously transferable method for artmaking. Framed by Margaret Mead’s framework that “the cybernetics of cybernetics” must include the observer, the study asks how recursion, self-reference, eigenforms, and the Subject might ground an aesthetics that is neither scientific nor purely relativist. This is done through an analytical and practical framework elucidated below.\n\nThe historical narrative highlights three archetypal “scientific artworks” as milestones in a century-long dialogue between art and feedback. Nicolas Schöffer’s CYSP 1 (1956) formalized cybernetic authorship by welding sensors to a kinetic sculpture, it was the first of its kind as a self-proclaimed cybernetic artwork\n\nEduardo Kac and Ikuo Nakamura’s Essay Concerning Human Understanding (1994) extended Schöffer’s premise into a telematic plant–bird feedback loop\n\nand Olafur Eliasson’s long-running exploration of mirrors, monofrequency lamps, and shadow architectures (1997-2025) constitute an eigenform, a self-stabilizing pattern of patterns over several artworks, years, and places. These works collectively realize how second-order cybernetics displaces the Romantic artist-subject with distributed networks of human and non-human actants.\n\nI draw from Margaret Mead, Ernst von Glasersfeld, Ranulph Glanville, and Pesi Masani, whose writings describe feedback, equilibrium, and information as fundamentally constructivist phenomena. I utilize concepts of phenomenology, technē, and Deleuzian immanence to argue that modern artworks are instantiated not in objective form but in the recursive coupling of system and observer. Consequently, the central opposition is no longer objectivity versus subjectivity but realist measurement versus radical constructivist insight, which I consider more of a fertile, Fichtian dialectic, rather than something mutually exclusive.\n\nIn terms of methodology, I reject large-scale empirical testing in favor of case studies and practical exercises that model cybernetic artworks as logical ecosystems of inputs, transformations, and outputs\n\nthis is explored through a practicum of my own, CONSTRUCTIONS, a cybernetic artwork that premiered at CalArts April 2025. Literature drawn from Masani, Kollias, Mailman, Scholte, Scott, and Shanken bring in complementary taxonomies through which each artwork’s cybernetic status is positioned. This approach is reflexive as such: every analytical move is itself an eigenbehavior, foregrounding the constructivist roles of scholarly agency.\n\nMy findings reveal both the promise and the paradox of a hard SoC aesthetics: on one hand, Eliasson’s longstanding manipulations of monochromatic light corroborate the formation of a lifelong artistic eigenform, showing how recursive material constraints can incubate a coherent aesthetic signature over decades\n\nKac and Nakamura’s plant-bird duet likewise demonstrates that cybernetic recursion can generate emergent sonic behavior while remaining necessarily sensitive to human proximity, thereby confirming Mead’s insistence on observer participation. However, I argue attempts to impose objective metrics onto such works are epistemically lopsided: Masani’s laboratory-style protocols illuminate feedback topologies but eclipse the lived phenomenology that renders the art affective\n\nconversely, radical constructivist readings capture experiential richness at the cost of replicable precision. In any case, the mismatch lies in differentiation between the ante- and ex post facto activities which govern the creative process, with realist cybernetics often on the ex post facto end of creation and traditional artmaking on the ante facto side of the schema.\n\nAccordingly, I conclude that the salient question is not “is this work cybernetic?” but “can cybernetics help us make sense of this work, and to what end?”. A provisional answer argues for methodological pluralism in the classroom and the studio: quantitative modeling maximizes informational conversion, while constructivist lenses expose how subjects co-construct artistic reality. The broader implication of my work in this topic is the advancement of a curriculum that privileges technē and phenomenology – ultimately skills of making and sensing – over post-hoc numerical validation, without outrightly rejecting the latter’s diagnostic power. By folding analytic recursion back onto itself (cybernetically), my research not only maps a lineage of cybernetic art but enacts the radical constructivist stance I advocate, modeling scholarship as a self-observing, self-adjusting system poised between empirical rigor and experiential depth.\n\nTopic Two:\n\n“IMMANENT PRACTICE: The Metaontology of Percussion Performance”\n\nMy research into the ontologies of percussion performance practice interrogates how twentieth- and twenty-first-century solo percussion emerged from, and continues to be shaped by, the intertwined forces of industrialization, imperial techno-capitalism, and neoliberal individualism. Framed by the guiding question “how do machine aesthetics inform ontologies of percussion?” I propose an immanent-practice model—drawn from Deleuze & Guattari’s plane of consistency—to reveal multiple, co-existing ontological logics at work whenever a percussionist strikes, touches, or otherwise activates sound objects and ultimately, from where those chosen sound objects come.\n\nAfter a cursory mapping of the historical processes by which both solo percussion and machine aesthetics gained popularity in the 20th centrury, I delineate three competing ontological paradigms—action, access, and function—and argue that dialectic “black-and-white” accounts such as the above are inadequate to describe the technopolitical realities of percussion today. By contrast, an immanent model allows distinct ontologies to overlap and re-configure locally, their boundaries mediated by machine aesthetics that pervade both instruments and the broader capitalist lifeworld. Key touchstones include Jones’s “ontology of access,” Beauton’s critique of technocapital immanence, and Koloogani & Ghazvini’s reading of Soviet avant-garde machine art. Visual and haptic phenomenology also play a central role: Curtin’s work on vibration and Zinman’s studies of synthetic film sound aid in elucidating the claim that percussion is always already a hybrid audio-visual event whose gestural visibility reinforces machinic metaphors: riveting, piston-like strokes, assembly-line repetition.\n\nMethodologically, the project integrates (1) a critical literature review spanning music theory, media studies, and Marxist cultural critique\n\n(2) four performer-centred case studies—Amy Knoles, Steven Schick, Josh Jones, and Bonnie Whiting—examined through semi-structured interviews, archival performance videos, and analysis of written texts\n\nand (3) comparative score analysis of seminal solo and multi-percussion works such as Stockhausen’s Zyklus and Xenakis’s Rebonds.\n\nMy research positions the concept of immanent practice as a unifying yet flexible framework capable of capturing plural ontologies without collapsing them into a single teleology. It complicates prevailing narratives that treat solo percussion’s ascent as purely artistic evolution, revealing instead a mesh of technocultural forces that both enable and demarcate creative agency.\n\nPedagogically, it urges percussion studios to foreground material histories, access politics, and expressive agency in curricula. For scholarship, it seeds future comparative work on non-Western percussion traditions and digitally networked performances, testing whether immanent models can account for globalized, latency-bound ontologies of strike and response\n\nthis is in the aims of furthering the groundwork already laid out in this field by the Schick studio (Jones, Beauton, et al).\n\nTopic Three:\n\nAfro-Venezuelan Music Rituals in Caribbean Venezuela and their diasporic connection to Ewe Music\n\nI confront the long-standing research vacuum surrounding Afro-Venezuelan ritual music and its West-African roots by raising two intertwined questions: (1) Do coastal Venezuelan festivals preserve musical and ritual structures traceable to Ewe and related West-African traditions? (2) How do these practices actively produce de-colonial social space for Black communities in Venezuela, especially in the regions of Barlovento, Caracas, Chuao, and Yare?\n\nThe trade in enslaved Africans established maroon settlements (cumbes) in Barlovento and other Caribbean-facing towns\n\nthere, African cosmologies fused with imposed Catholic observances and indigenous ways of being, giving rise to Corpus Christi’s Diablos Danzantes and the June festivals of San Juan Bautista. Sources from Aleman-Fernández (1990) and Lengwinat (2017) show how drum-centred rituals, masked processions, and spirit invocations were preserved precisely because they were reframed as church feasts, a phenomenon aggravated by twentieth-century Venezuelan folklorisation policies identified by Núñez (2004) and Walton (2017).\n\nThe project combines archival analysis, comparative transcription of recorded tambor and mina drumming (e.g., Tambor Urbano, Un Solo Pueblo), analysis of ethnographic interviews with festival bearers, and two detailed case studies: the Diablos Danzantes (Corpus Christi festival, in May) and the San Juan cycle in Barlovento (late June). Rhythmic and functional features are measured against Ewe drum-ensemble grid patterns (Gerstin 2017) to distinguish direct retentions from creolised inventions. Rhythmic transcription aids in demonstrating the link between the drum figures of Barlovento and the Ewe bell grid: the Barloventoan mina and curbata’s ostinati, call-and-response chants, and lead-drum exchanges replicate the atsimevu-led structures of Agbadza and Gahu. A cursory explanation of auxiliary practices like Quitiplás keeps the study grounded in contemporary cultural practice.\n\nIn terms of analysis, Henri Lefebvre’s concept of the social “production of space” illuminates the manner in which public spaces (namely processional routes, church courtyards, and village plazas, in this case) are transformed into experiential “capital-p” places of Afro-descendant self-determination. Complementarily, Antonio Gramsci’s paradigm of the counter-hegemonic “war of position” elucidates how these ceremonial practices persist as state-endorsed yet quietly insurgent interventions within a predominantly Catholic-mestizo hegemony.\n\nRecognizing Afro-Venezuelan festivals as part of the broader Black Atlantic and Southern Caribbean confronts Afro-Cuban/AfroCaribbean curricula that privilege Cuba in percussion pedagogy\n\nthis inclusion enriches rhythm-pedagogy, expands instrumentaria (quitiplás, furruco), and models community-based practices documented by Lengwinat and Walton. Finally, by situating music-making inside spatial theory, my research offers a template for analysing other Latin-American ritual soundscapes and calls for deeper fieldwork once current travel and political constraints subside.\n\nAs such, Afro-Venezuelan ritual musics are not peripheral curiosities but dynamic, place-making arts that sustain West-African rhythmic logics, negotiate colonial power, and demand a central place in trans-Atlantic musicology and decolonial pedagogy.","audio":null,"pdf":null,"cues":[],"audioId":"wc-a4","one":"Topic Driven Research portfolio (thesis), California Institute of the Arts; 1. CONCERNING HUMAN UNDERSTANDING: The Case for a Radical Constructivist Approach in Music and Aesthetic Theory 2. IMMANENT PRACTICE: The Metaontology of Percussio…","onelinerEffective":"Topic Driven Research portfolio (thesis), California Institute of the Arts; 1. CONCERNING HUMAN UNDERSTANDING: The Case for a Radical Constructivist Approach in Music and Aesthetic Theory 2. IMMANENT PRACTICE: The Metaontology of Percussio…","descriptionEffective":"Topic Driven Research Summaries\n\nSebastian Suarez-Solis, DMA Composer-Performer, CalArts\n\nTopic One:\n\n“CONCERNING HUMAN UNDERSTANDING: The Case for a Radical Constructivist Approach in Music and Aesthetic Theory”\n\nThis topic advances a programmatic inquiry into whether second-order cybernetics (SoC) can yield a rigorously transferable method for artmaking. Framed by Margaret Mead’s framework that “the cybernetics of cybernetics” must include the observer tic artwork that premiered at CalArts April 2025. Literature drawn from Masani, Kollias, Mailman, Scholte, Scott, and Shanken bring in complementary taxonomies through which each artwork’s cybernetic status is positioned. This approach is reflexive as such: every analytical move is itself an eigenbehavior, foregrounding the constructivist roles of scholarly agency.\n\nMy findings reveal both the promise and the paradox of a hard SoC aesthetics: on one hand, Eliasson’s longstanding manipulations of monochromatic light corroborate the formation of a lifelong artistic eigenform, showing how recursive material constraints can incubate a coherent aesthetic signature over decades\n\nKac and Nakamura’s plant-bird duet likewise demonstrates that cybernetic recursion can generate emergent sonic behavior while remaining necessarily sensitive to human proximity, thereby confirming Mead’s insistence on observer participation. However, I argue attempts to impose objective metrics onto such works are epistemically lopsided: Masani’s laboratory-style protocols illuminate feedback topologies but eclipse the lived phenomenology that renders the art affective\n\nconversely, radical constructivist readings capture experiential richness at the cost of replicable precision. In any case, the mismatch lies in differentiation between the ante- and ex post facto activities which govern the creative process, with realist cybernetics often on the ex post facto end of creation and traditional artmaking on the ante facto side of the schema.\n\nAccordingly, I conclude that the salient question is not “is this work cybernetic?” but “can cybernetics help us make sense of this work, and to what end?”. A provisional answer argues for methodological pluralism in the classroom and the studio: quantitative modeling maximizes informational conversion, while constructivist lenses expose how subjects co-construct artistic reality. The broader implication of my work in this topic is the advancement of a curriculum that privileges technē and phenomenology – ultimately skills of making and sensing – over post-hoc numerical validation, without outrightly rejecting the latter’s diagnostic power. By folding analytic recursion back onto itself (cybernetically), my research not only maps a lineage of cybernetic art but enacts the radical constructivist stance I advocate, modeling scholarship as a self-observing, self-adjusting system poised between empirical rigor and experiential depth.\n\nTopic Two:\n\n“IMMANENT PRACTICE: The Metaontology of Percussion Performance”\n\nMy research into the ontologies of percussion performance practice interrogates how twentieth- and twenty-first-century solo percussion emerged from, and continues to be shaped by, the intertwined forces of industrialization, imperial techno-capitalism, and neoliberal individualism. Framed by the guiding question “how do machine aesthetics inform ontologies of percussion?” I propose an immanent-practice model—drawn from Deleuze & Guattari’s plane of consistency—to reveal multiple, co-existing ontological logics at work whenever a percussionist strikes, touches, or otherwise activates sound objects and ultimately, from where those chosen sound objects come.\n\nAfter a cursory mapping of the historical processes by which both solo percussion and machine aesthetics gained popularity in the 20th centrury, I delineate three competing ontological paradigms—action, access, and function—and argue that dialectic “black-and-white” accounts such as the above are inadequate to describe the technopolitical realities of percussion today. By contrast, an immanent model allows distinct ontologies to overlap and re-configure locally, their boundaries mediated by machine aesthetics that pervade both instruments and the broader capitalist lifeworld. Key touchstones include Jones’s “ontology of access,” Beauton’s critique of technocapital immanence, and Koloogani & Ghazvini’s reading of Soviet avant-garde machine art. Visual and haptic phenomenology also play a central role: Curtin’s work on vibration and Zinman’s studies of synthetic film sound aid in elucidating the claim that percussion is always already a hybrid audio-visual event whose gestural visibility reinforces machinic metaphors: riveting, piston-like strokes, assembly-line repetition.\n\nMethodologically, the project integrates (1) a critical literature review spanning music theory, media studies, and Marxist cultural critique\n\n(2) four performer-centred case studies—Amy Knoles, Steven Schick, Josh Jones, and Bonnie Whiting—examined through semi-structured interviews, archival performance videos, and analysis of written texts\n\nand (3) comparative score analysis of seminal solo and multi-percussion works such as Stockhausen’s Zyklus and Xenakis’s Rebonds.\n\nMy research positions the concept of immanent practice as a unifying yet flexible framework capable of capturing plural ontologies without collapsing them into a single teleology. It complicates prevailing narratives that treat solo percussion’s ascent as purely artistic evolution, revealing instead a mesh of technocultural forces that both enable and demarcate creative agency.\n\nPedagogically, it urges percussion studios to foreground material histories, access politics, and expressive agency in curricula. For scholarship, it seeds future comparative work on non-Western percussion traditions and digitally networked performances, testing whether immanent models can account for globalized, latency-bound ontologies of strike and response\n\nthis is in the aims of furthering the groundwork already laid out in this field by the Schick studio (Jones, Beauton, et al).\n\nTopic Three:\n\nAfro-Venezuelan Music Rituals in Caribbean Venezuela and their diasporic connection to Ewe Music\n\nI confront the long-standing research vacuum surrounding Afro-Venezuelan ritual music and its West-African roots by raising two intertwined questions: (1) Do coastal Venezuelan festivals preserve musical and ritual structures traceable to Ewe and related West-African traditions? (2) How do these practices actively produce de-colonial social space for Black communities in Venezuela, especially in the regions of Barlovento, Caracas, Chuao, and Yare?\n\nThe trade in enslaved Africans established maroon settlements (cumbes) in Barlovento and other Caribbean-facing towns\n\nthere, African cosmologies fused with imposed Catholic observances and indigenous ways of being, giving rise to Corpus Christi’s Diablos Danzantes and the June festivals of San Juan Bautista. Sources from Aleman-Fernández (1990) and Lengwinat (2017) show how drum-centred rituals, masked processions, and spirit invocations were preserved precisely because they were reframed as church feasts, a phenomenon aggravated by twentieth-century Venezuelan folklorisation policies identified by Núñez (2004) and Walton (2017).\n\nThe project combines archival analysis, comparative transcription of recorded tambor and mina drumming (e.g., Tambor Urbano, Un Solo Pueblo), analysis of ethnographic interviews with festival bearers, and two detailed case studies: the Diablos Danzantes (Corpus Christi festival, in May) and the San Juan cycle in Barlovento (late June). Rhythmic and functional features are measured against Ewe drum-ensemble grid patterns (Gerstin 2017) to distinguish direct retentions from creolised inventions. Rhythmic transcription aids in demonstrating the link between the drum figures of Barlovento and the Ewe bell grid: the Barloventoan mina and curbata’s ostinati, call-and-response chants, and lead-drum exchanges replicate the atsimevu-led structures of Agbadza and Gahu. A cursory explanation of auxiliary practices like Quitiplás keeps the study grounded in contemporary cultural practice.\n\nIn terms of analysis, Henri Lefebvre’s concept of the social “production of space” illuminates the manner in which public spaces (namely processional routes, church courtyards, and village plazas, in this case) are transformed into experiential “capital-p” places of Afro-descendant self-determination. Complementarily, Antonio Gramsci’s paradigm of the counter-hegemonic “war of position” elucidates how these ceremonial practices persist as state-endorsed yet quietly insurgent interventions within a predominantly Catholic-mestizo hegemony.\n\nRecognizing Afro-Venezuelan festivals as part of the broader Black Atlantic and Southern Caribbean confronts Afro-Cuban/AfroCaribbean curricula that privilege Cuba in percussion pedagogy\n\nthis inclusion enriches rhythm-pedagogy, expands instrumentaria (quitiplás, furruco), and models community-based practices documented by Lengwinat and Walton. Finally, by situating music-making inside spatial theory, my research offers a template for analysing other Latin-American ritual soundscapes and calls for deeper fieldwork once current travel and political constraints subside.\n\nAs such, Afro-Venezuelan ritual musics are not peripheral curiosities but dynamic, place-making arts that sustain West-African rhythmic logics, negotiate colonial power, and demand a central place in trans-Atlantic musicology and decolonial pedagogy."},{"id":5,"slug":"fulia","title":"Fulia as an embodied product of space and placemaking","oneliner":"In preparation","description":"The European folía phrase – coupled with Canarian folías, African cultural practice and indigenous lived experience – fused in modern Venezuela between the 16-20th centuries to form a syncretic cultural object called the fulía. This cultural object, during the nation’s republic era in the mid-to-late 20th century, was exported and commercialized to a transnational audience, both reinforcing and subverting notions of cultural hegemony. Ultimately, Afro-Venezuelan performances of fulía, whether sacred or secular, prove to be sources of communal entanglement and cultural resistance.\n\nThrough Gramscian and Lefebvrian lenses, the preservation of these oral traditions by community leaders is observed as 1). a subaltern rejection of cultural hegemony and subsequent assertion of an alternative good sense, and\n\n2). a reclamation of the processes of the production of space.\n\nKeywords: fulía, folía, Barlovento, Caracas, tambor, production of space, placemaking, Tambor Urbano, cultural hegemony, subaltern","audio":null,"pdf":null,"cues":[],"audioId":"wc-a5","one":"In preparation","onelinerEffective":"In preparation","descriptionEffective":"The European folía phrase – coupled with Canarian folías, African cultural practice and indigenous lived experience – fused in modern Venezuela between the 16-20th centuries to form a syncretic cultural object called the fulía. This cultural object, during the nation’s republic era in the mid-to-late 20th century, was exported and commercialized to a transnational audience, both reinforcing and subverting notions of cultural hegemony. Ultimately, Afro-Venezuelan performances of fulía, whether sacred or secular, prove to be sources of communal entanglement and cultural resistance.\n\nThrough Gramscian and Lefebvrian lenses, the preservation of these oral traditions by community leaders is observed as 1). a subaltern rejection of cultural hegemony and subsequent assertion of an alternative good sense, and\n\n2). a reclamation of the processes of the production of space.\n\nKeywords: fulía, folía, Barlovento, Caracas, tambor, production of space, placemaking, Tambor Urbano, cultural hegemony, subaltern"},{"id":6,"slug":"gptosc","title":"GPTOSC","oneliner":"OSC protocol for ChatGPT-generated chamber score; performance score and installation instructions","description":"GPTs suck at creative work, but giving it data to spit out is easy. Let's turn that into something we can use musically, having it draw numbers and make musical decisions about events and timing. How might we use a GPT instance to actually make music, instead of 1) having it give us shitty bar chords/half baked music theory or 2) ripping other artists off?\n\nIf an LLM is just a prediction machine, then how can we use that to our advantage, i.e. to make iterative, loop-based improvisational works?","audio":null,"pdf":null,"cues":[],"audioId":"wc-a6","one":"OSC protocol for ChatGPT-generated chamber score; performance score and installation instructions","onelinerEffective":"OSC protocol for ChatGPT-generated chamber score; performance score and installation instructions","descriptionEffective":"GPTs suck at creative work, but giving it data to spit out is easy. Let's turn that into something we can use musically, having it draw numbers and make musical decisions about events and timing. How might we use a GPT instance to actually make music, instead of 1) having it give us shitty bar chords/half baked music theory or 2) ripping other artists off?\n\nIf an LLM is just a prediction machine, then how can we use that to our advantage, i.e. to make iterative, loop-based improvisational works?"},{"id":7,"slug":"constructions","title":"CONSTRUCTIONS","oneliner":"Six sculpture performance installation; sod, steel, glass, plastic, grass, douglas fir timber, LED/incandescent/low-pressure sodium-vapor light bulbs, LA streetlight fixtures c. 1970–2010; performance installation chamber symphony","description":"light without color\n\nCONSTRUCTIONS is a spatiodynamic installation where industrial light sculptures become instruments of time, perception, and material resonance. 6 hand-fabricated sculptures using steel, acrylic glass, timber, sod, soil, and three kinds of light sources (incandescent, LED, and low-pressure sodium vapor) change our perception of space and color through a light-based performance using internet-based relays. 5 performers use the relays to \"play\" the sculptures by turning them on and off remotely.\n\nInitially performed as a symphonic work for sonic sculptures, the installation explores illumination and its inverse, revealing the technological architectures that mediate movement, space, and placemaking. Salvaged high-intensity discharge streetlamps from Palomar, CA, bear the histories of their function, marking shifts in industrial fabrication and civic planning. These lights impose on you a perceptive monochromy, collapsing color into shadows and textures, constructing space itself. This constriction, far from an erasure, produces an intensification: textures heighten, shadows sharpen, and objects lose their categorical immediacy.","audio":null,"pdf":null,"cues":[],"audioId":"wc-a7","one":"Six sculpture performance installation; sod, steel, glass, plastic, grass, douglas fir timber, LED/incandescent/low-pressure sodium-vapor light bulbs, LA streetlight fixtures c. 1970–2010; performance installation chamber symphony","onelinerEffective":"Six sculpture performance installation; sod, steel, glass, plastic, grass, douglas fir timber, LED/incandescent/low-pressure sodium-vapor light bulbs, LA streetlight fixtures c. 1970–2010; performance installation chamber symphony","descriptionEffective":"light without color\n\nCONSTRUCTIONS is a spatiodynamic installation where industrial light sculptures become instruments of time, perception, and material resonance. 6 hand-fabricated sculptures using steel, acrylic glass, timber, sod, soil, and three kinds of light sources (incandescent, LED, and low-pressure sodium vapor) change our perception of space and color through a light-based performance using internet-based relays. 5 performers use the relays to \"play\" the sculptures by turning them on and off remotely.\n\nInitially performed as a symphonic work for sonic sculptures, the installation explores illumination and its inverse, revealing the technological architectures that mediate movement, space, and placemaking. Salvaged high-intensity discharge streetlamps from Palomar, CA, bear the histories of their function, marking shifts in industrial fabrication and civic planning. These lights impose on you a perceptive monochromy, collapsing color into shadows and textures, constructing space itself. This constriction, far from an erasure, produces an intensification: textures heighten, shadows sharpen, and objects lose their categorical immediacy."},{"id":8,"slug":"no-neutral-spaces","title":"NO NEUTRAL SPACES: How Placehood Creates Subjectivities","description":"In preparation","audio":null,"pdf":null,"cues":[],"audioId":"wc-a8","onelinerEffective":null,"descriptionEffective":"In preparation"},{"id":9,"slug":"amps-marimba","title":"AMPLIFICATIONS: I. marimbaideefixe","oneliner":"for solo piano-amplified marimba","description":"transcription/recreation of track 1 on Amplifications (2024) album.","audio":null,"pdf":null,"cues":[],"audioId":"wc-a9","one":"for solo piano-amplified marimba","onelinerEffective":"for solo piano-amplified marimba","descriptionEffective":"transcription/recreation of track 1 on Amplifications (2024) album."},{"id":10,"slug":"feedback-music","title":"feedback music","oneliner":"Bandcamp","description":"* VOLUME WARNING: these tracks are based around exploiting feedback as an acoustical phenomenon, and as such, are quite loud and vary greatly in dynamics (often suddenly). While most tracks can be mastered well to avoid such moments, tracks with an asterisk are minimally mastered to preserve their waveforms. Mastering often involves use of limiting and compressing, and if I want to present the qualities of the waves (either sonically or, more important, visually) they cannot be limited. It would not look right, which is important for the WYSIWYG oscilloscope visuals. Other times, the sound of the feedback is itself clipping and distorting, and limiting that distortion would quiet the characteristics of the sounds I am trying to present. Listen with caution, lower your volume.\n\n†Some tracks feature visuals, which are recommended for a first listen and are available with the included packet (available 03/01/2024).\n\n_______________________\n\na collection of sounds and video exploiting acoustical feedback. all tracks are live recordings of captured feedback. any distortion you hear is caused in situ.\n\nin Cyber-Theremin I & II, i turn my laptop into a feedback machine by running a patch through my computers microphone and speakers at the same time (+video).\n\nin Squaring the Circle, i use sine waves in a custom 7-limit a''=415 temperament to paint shapes on a lissajous oscilloscope (+video).\n\nin Mixer, with and without input, a no input mixer set meets input.\n\nin Plate I & II, i use metal plates to create reverb and feedback. in the first, i take a thin sheet of metal (presumably aluminum) and attach two exciters to it. the exciters are fed directly to to a microphone, which is sometimes stationary, sometimes moving about the body of the plate. in Plate II, I run the same setup through a heavier metal plate, playing a piano through persistent feedback to cause live bitcrushing. there is no artificial bit reduction applied, either digitally or electronically. What you are hearing is acoustically generated, occurring in physical space.\n\nin pia/o (pronounced like the instrument), a piano signal is fedback into itself through a controlled exploitation of hearback monitoring. the piano was recorded hot intentionally, so as to cause distortion. monitors were placed on the piano body, which reverberate the distortion, which the mics pick up, feeding back upon itself.","audio":null,"pdf":null,"cues":[],"audioId":"wc-a10","one":"Bandcamp","onelinerEffective":"Bandcamp","descriptionEffective":"* VOLUME WARNING: these tracks are based around exploiting feedback as an acoustical phenomenon, and as such, are quite loud and vary greatly in dynamics (often suddenly). While most tracks can be mastered well to avoid such moments, tracks with an asterisk are minimally mastered to preserve their waveforms. Mastering often involves use of limiting and compressing, and if I want to present the qualities of the waves (either sonically or, more important, visually) they cannot be limited. It would not look right, which is important for the WYSIWYG oscilloscope visuals. Other times, the sound of the feedback is itself clipping and distorting, and limiting that distortion would quiet the characteristics of the sounds I am trying to present. Listen with caution, lower your volume.\n\n†Some tracks feature visuals, which are recommended for a first listen and are available with the included packet (available 03/01/2024).\n\n_______________________\n\na collection of sounds and video exploiting acoustical feedback. all tracks are live recordings of captured feedback. any distortion you hear is caused in situ.\n\nin Cyber-Theremin I & II, i turn my laptop into a feedback machine by running a patch through my computers microphone and speakers at the same time (+video).\n\nin Squaring the Circle, i use sine waves in a custom 7-limit a''=415 temperament to paint shapes on a lissajous oscilloscope (+video).\n\nin Mixer, with and without input, a no input mixer set meets input.\n\nin Plate I & II, i use metal plates to create reverb and feedback. in the first, i take a thin sheet of metal (presumably aluminum) and attach two exciters to it. the exciters are fed directly to to a microphone, which is sometimes stationary, sometimes moving about the body of the plate. in Plate II, I run the same setup through a heavier metal plate, playing a piano through persistent feedback to cause live bitcrushing. there is no artificial bit reduction applied, either digitally or electronically. What you are hearing is acoustically generated, occurring in physical space.\n\nin pia/o (pronounced like the instrument), a piano signal is fedback into itself through a controlled exploitation of hearback monitoring. the piano was recorded hot intentionally, so as to cause distortion. monitors were placed on the piano body, which reverberate the distortion, which the mics pick up, feeding back upon itself."},{"id":11,"slug":"amplifications","title":"Amplifications","oneliner":"Bandcamp","description":"a series of improvised compositions, utilizing multiple pianos as resonating bodies to extend the sustain of various instruments. with various metal implements scattered throughout the piano bodies, the strings sympathetically reverberate along to the improvisatory sounds of each instrument, at times a whisper, at times a roar.\n\nmicrophones are placed inside the body of the piano capturing a large, harmonious reverberation, a ghostly chamber ensemble of one.","audio":null,"pdf":null,"cues":[],"audioId":"wc-a11","one":"Bandcamp","onelinerEffective":"Bandcamp","descriptionEffective":"a series of improvised compositions, utilizing multiple pianos as resonating bodies to extend the sustain of various instruments. with various metal implements scattered throughout the piano bodies, the strings sympathetically reverberate along to the improvisatory sounds of each instrument, at times a whisper, at times a roar.\n\nmicrophones are placed inside the body of the piano capturing a large, harmonious reverberation, a ghostly chamber ensemble of one."},{"id":12,"slug":"miles-davis","title":"Miles Davis, Paul Buckmaster, and Teo Macero at 50: A Retrospective Reclamation of ‘Jazz’s Most Hated Record’ (with Enrico Merlin)","description":"In preparation","audio":null,"pdf":null,"cues":[],"audioId":"wc-a12","onelinerEffective":null,"descriptionEffective":"In preparation"},{"id":13,"slug":"cybernetics-dialectics","title":"Cybernetics, dialectics, and phenomenology in the works of Sebastian Suarez-Solis composed during 2022-2023","description":"MM Music Composition, Peabody Institute of the Johns Hopkins University","audio":null,"pdf":null,"cues":[],"audioId":"wc-a13","onelinerEffective":null,"descriptionEffective":"MM Music Composition, Peabody Institute of the Johns Hopkins University"},{"id":14,"slug":"redacted","title":"█████","oneliner":"open chamber graphic score based on redactions of other texts","description":"38 page digital graphic score based on the re uncut improvisations (mostly), split into tracks, which gradually change and morph over the course of the structure's construction.\n\nThe machines' delay outs are wired to each others' delay ins for a harmonious filtered delay feedback. Often times, envelopes from one device are sent to the other to make organic rhythms out of the control voltage from one module, using fundamental beat patterns (4 on the floor, tresillo, etc) as a source rhythm. The Pulsar-23 synthesizers are really quite adept at making IDM/EDM.","audio":null,"pdf":null,"cues":[],"audioId":"wc-a18","one":"Bandcamp","onelinerEffective":"Bandcamp","descriptionEffective":"A series of improvisations on two side-by-side Soma Pulsar-23 synthesizers. At times their clocks are connected, at times they are not, creating both strict and free polyrhythms. The album is divided into three parts, presented as three structures. These structures are full-length, uncut improvisations (mostly), split into tracks, which gradually change and morph over the course of the structure's construction.\n\nThe machines' delay outs are wired to each others' delay ins for a harmonious filtered delay feedback. Often times, envelopes from one device are sent to the other to make organic rhythms out of the control voltage from one module, using fundamental beat patterns (4 on the floor, tresillo, etc) as a source rhythm. The Pulsar-23 synthesizers are really quite adept at making IDM/EDM."},{"id":19,"slug":"string-theory","title":"String theory","oneliner":"Bandcamp","description":"The third album of cybernetic harpsichord music from Sebastian Suarez-Solis. Presented as one sonic event, this offering explores new terrain on the harpsichord through old school time-stretching techniques. An improvisation of improvisations, there is no barrier between composition and extemporization. Thirty minutes of harpsichord improvisation (on the keys and on the strings, with electronic bows and other preparations) are layered, manipulated, and stretched by several orders of magnitude to creeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaatttttttttteeeeeeeeeeeeeeeee aaaaaaaaaaaaaaaaaaaaa fffffeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeelllliiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiinnnnngggg ooooooooofffff eeeeeeeeeeeeeeeellllaaaaaaaaaaaaaaaaaaaaaaatttteeeeeeeeeeeeddddddddddddddd ttttttrrrrrrrrrrrrrrrrrraaaaaaaaaaaaaannnnnnnnnnnnnnnnnnnssssssccccccccccceeeeeeeeeeeeeennnnnnnddddddddddddeeeeeeeeeeeeeeeeeeeeeeeeeeeennnnnnnnnnnnnccccccceeeeeeeeeeeeee\n\nLISTENING INSTRUCTIONS\n\nlisten super loud, please, with some headphones or some speakers.\n\nthis album is meant to be heard in order","audio":null,"pdf":null,"cues":[],"audioId":"wc-a19","one":"Bandcamp","onelinerEffective":"Bandcamp","descriptionEffective":"The third album of cybernetic harpsichord music from Sebastian Suarez-Solis. Presented as one sonic event, this offering explores new terrain on the harpsichord through old school time-stretching techniques. An improvisation of improvisations, there is no barrier between composition and extemporization. Thirty minutes of harpsichord improvisation (on the keys and on the strings, with electronic bows and other preparations) are layered, manipulated, and stretched by several orders of magnitude to creeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaatttttttttteeeeeeeeeeeeeeeee aaaaaaaaaaaaaaaaaaaaa fffffeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeelllliiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiinnnnngggg ooooooooofffff eeeeeeeeeeeeeeeellllaaaaaaaaaaaaaaaaaaaaaaatttteeeeeeeeeeeeddddddddddddddd ttttttrrrrrrrrrrrrrrrrrraaaaaaaaaaaaaannnnnnnnnnnnnnnnnnnssssssccccccccccceeeeeeeeeeeeeennnnnnnddddddddddddeeeeeeeeeeeeeeeeeeeeeeeeeeeennnnnnnnnnnnnccccccceeeeeeeeeeeeee\n\nLISTENING INSTRUCTIONS\n\nlisten super loud, please, with some headphones or some speakers.\n\nthis album is meant to be heard in order"},{"id":20,"slug":"short-drones","title":"SHORT DRONES","oneliner":"Bandcamp","description":"4 short (less than 5 minute) pieces of music featuring drones, largely static in harmonic content, from samples of prepared harpsichord, modular synthesizer (VCV Rack 2), and organ.\n\nLISTEN LOUD AND IN ORDER // each piece transitions directly into the next\n\n---\n\ndrone i: harsh noise and heavy bass meet harpsichord drones\n\ndrone ii: harpsichord drones with electronic percussion\n\ndrone iii: harpsichord drones with noise\n\ndrone iv: harpsichord drones meets electronics, sampled organ drones, and sampled harpsichord.","audio":null,"pdf":null,"cues":[],"audioId":"wc-a20","one":"Bandcamp","onelinerEffective":"Bandcamp","descriptionEffective":"4 short (less than 5 minute) pieces of music featuring drones, largely static in harmonic content, from samples of prepared harpsichord, modular synthesizer (VCV Rack 2), and organ.\n\nLISTEN LOUD AND IN ORDER // each piece transitions directly into the next\n\n---\n\ndrone i: harsh noise and heavy bass meet harpsichord drones\n\ndrone ii: harpsichord drones with electronic percussion\n\ndrone iii: harpsichord drones with noise\n\ndrone iv: harpsichord drones meets electronics, sampled organ drones, and sampled harpsichord."},{"id":21,"slug":"free-temper","title":"Free Temper","oneliner":"Bandcamp","description":"an improvisation of new techniques on the harpsichord, in free temperament. long live the liberated notes.","audio":null,"pdf":null,"cues":[],"audioId":"wc-a21","one":"Bandcamp","onelinerEffective":"Bandcamp","descriptionEffective":"an improvisation of new techniques on the harpsichord, in free temperament. long live the liberated notes."},{"id":22,"slug":"meta-improvisation","title":"meta-improvisation no. 1","oneliner":"video installation remixing gamba samples","description":"an improvisation of improvisations.","audio":null,"pdf":null,"cues":[],"audioId":"wc-a22","one":"video installation remixing gamba samples","onelinerEffective":"video installation remixing gamba samples","descriptionEffective":"an improvisation of improvisations."},{"id":23,"slug":"rasga","title":"Rasga","description":"for theorbo","audio":null,"pdf":null,"cues":[],"audioId":"wc-a23","onelinerEffective":null,"descriptionEffective":"for theorbo"},{"id":24,"slug":"seven-sounds","title":"Seven Sounds for Strings","oneliner":"for prepared harpsichord","description":"THIS IS NOT BAROQUE MUSIC. THIS IS NOT RENAISSANCE MUSIC. THERE IS NO COUNTERPOINT. THERE ARE NO LINES. THIS IS NOT COMMON PRACTICE PERIOD. THIS IS NOT AN ACT OF CREATION. THIS IS NOT IMPROVISATION. THIS IS NOT UNFOCUSED. THE MESSAGE IS CLEAR THE MESSAGE IS CLEAR THE MESSAGE IS CLEAR: LA PATRIA VIVE EN ESTE ACTO DE DESTRUCCIÓN","audio":null,"pdf":null,"cues":[],"audioId":"wc-a24","one":"for prepared harpsichord","onelinerEffective":"for prepared harpsichord","descriptionEffective":"THIS IS NOT BAROQUE MUSIC. THIS IS NOT RENAISSANCE MUSIC. THERE IS NO COUNTERPOINT. THERE ARE NO LINES. THIS IS NOT COMMON PRACTICE PERIOD. THIS IS NOT AN ACT OF CREATION. THIS IS NOT IMPROVISATION. THIS IS NOT UNFOCUSED. THE MESSAGE IS CLEAR THE MESSAGE IS CLEAR THE MESSAGE IS CLEAR: LA PATRIA VIVE EN ESTE ACTO DE DESTRUCCIÓN"},{"id":25,"slug":"pasos-invisibles","title":"pasos invisibles","description":"sculpture score for continuo and at least one other player","audio":null,"pdf":null,"cues":[],"audioId":"wc-a25","onelinerEffective":null,"descriptionEffective":"sculpture score for continuo and at least one other player"},{"id":26,"slug":"live-election-bingo","title":"LIVE ELECTION BINGO","description":"fixed composition of a week’s worth of music, sculpture, and painting","audio":null,"pdf":null,"cues":[],"audioId":"wc-a26","onelinerEffective":null,"descriptionEffective":"fixed composition of a week’s worth of music, sculpture, and painting"},{"id":27,"slug":"hapax","title":"Hapax Legomenon","oneliner":"for lipsynching ensemble","description":"hapax legomenon, (n): a word or form occurring only once in a document or corpus.\n\netymology: greek, something said only once.\n\n– accessed on merriam-webster.com on 09/26/22","audio":null,"pdf":null,"cues":[],"audioId":"wc-a27","one":"for lipsynching ensemble","onelinerEffective":"for lipsynching ensemble","descriptionEffective":"hapax legomenon, (n): a word or form occurring only once in a document or corpus.\n\netymology: greek, something said only once.\n\n– accessed on merriam-webster.com on 09/26/22"},{"id":28,"slug":"mere-particle","title":"mere particle of a machine, with less will","description":"for acoustic instrument & MaxMSP patch (1–2 players)","audio":null,"pdf":null,"cues":[],"audioId":"wc-a28","onelinerEffective":null,"descriptionEffective":"for acoustic instrument & MaxMSP patch (1–2 players)"},{"id":29,"slug":"string-quartet-2","title":"String Quartet No. 2 “soundnoisemusic”","oneliner":"string quartet","description":"Every other performance, this piece is entirely improvised. Every other performance, the performers follow the through-composed score. Every other other performance, this piece is played at 80% intent and 50% resentment. Every other other other performance, the members of this piece trade parts. Every 10 performances, the members of the ensemble are playing a cruel joke on the composer and the audience. Every 12, the 5th page of every part is swapped for a page from one of J.S. Bach’s Sonatas or Partitas for Violin. On any performance where it is the ensemble’s second time performing that day, the music is to be read in retrograde inversion. Every peformance indoors must be done at double tempo. In the event that performers were not fed prior to performing, they may play noise wherever they may choose.\n\nIf you cannot tell the difference if you cannot beat ‘em join ‘em then does it even matter?\n\n---\n\n\"Heard melodies are sweet, but those unheard\n\nAre sweeter\n\ntherefore, ye soft pipes, play on\n\nNot to the sensual ear, but, more endeared,\n\nPipe to the spirit ditties of no tone:\"\n\nJohn Keats, “Ode on a Grecian Urn”, lines 11-14","audio":null,"pdf":null,"cues":[],"audioId":"wc-a29","one":"string quartet","onelinerEffective":"string quartet","descriptionEffective":"Every other performance, this piece is entirely improvised. Every other performance, the performers follow the through-composed score. Every other other performance, this piece is played at 80% intent and 50% resentment. Every other other other performance, the members of this piece trade parts. Every 10 performances, the members of the ensemble are playing a cruel joke on the composer and the audience. Every 12, the 5th page of every part is swapped for a page from one of J.S. Bach’s Sonatas or Partitas for Violin. On any performance where it is the ensemble’s second time performing that day, the music is to be read in retrograde inversion. Every peformance indoors must be done at double tempo. In the event that performers were not fed prior to performing, they may play noise wherever they may choose.\n\nIf you cannot tell the difference if you cannot beat ‘em join ‘em then does it even matter?\n\n---\n\n\"Heard melodies are sweet, but those unheard\n\nAre sweeter\n\ntherefore, ye soft pipes, play on\n\nNot to the sensual ear, but, more endeared,\n\nPipe to the spirit ditties of no tone:\"\n\nJohn Keats, “Ode on a Grecian Urn”, lines 11-14"},{"id":30,"slug":"great-dane","title":"great dane","oneliner":"piano trio","description":"i remember the last time i saw you.\n\ni was driving, the city filled to the brim with life,\n\nbursting at the seams, ready to rupture, teeming\n\nthe streets full of people,\n\nfood, friendship, and follies,\n\ngrit, broken glass, the great steeple\n\nringing, one bell later than the others,\n\ncars passing, one ways one way, bi-ways the other way,\n\nwith one great dane prancing between sidewalk and asphalt.\n\nit was april, yet the cold would lap up at your ankles\n\nand consume you before you knew it.\n\nit was unusual for this time of the year\n\nit would happen every couple of weeks and settle down eventually.\n\nit ran fast, the legs outstretching the body, overtaking its pace\n\nand scrunching up, like a spring of flesh and sinew.\n\ni wouldn’t have imagined this to be the last big chill –\n\nnot a sign of slowing, but cold is warm enough.\n\nit was fast. really fast\n\nstraight into a car it ran.\n\nit’s as if it didn’t know it was dead yet, it kept running.\n\nas if the cold was a cruel anesthetic\n\nwe locked eyes, the second law granting this creature a momentary reprieve\n\nwhen its muscles twisted... a moiety of bone and bloody foam...\n\n...caught between forming a next stride and giving way to that incalculable force.\n\ni called you. i called for you.\n\nyou said you were never there for me and I apologized.","audio":null,"pdf":null,"cues":[],"audioId":"wc-a30","one":"piano trio","onelinerEffective":"piano trio","descriptionEffective":"i remember the last time i saw you.\n\ni was driving, the city filled to the brim with life,\n\nbursting at the seams, ready to rupture, teeming\n\nthe streets full of people,\n\nfood, friendship, and follies,\n\ngrit, broken glass, the great steeple\n\nringing, one bell later than the others,\n\ncars passing, one ways one way, bi-ways the other way,\n\nwith one great dane prancing between sidewalk and asphalt.\n\nit was april, yet the cold would lap up at your ankles\n\nand consume you before you knew it.\n\nit was unusual for this time of the year\n\nit would happen every couple of weeks and settle down eventually.\n\nit ran fast, the legs outstretching the body, overtaking its pace\n\nand scrunching up, like a spring of flesh and sinew.\n\ni wouldn’t have imagined this to be the last big chill –\n\nnot a sign of slowing, but cold is warm enough.\n\nit was fast. really fast\n\nstraight into a car it ran.\n\nit’s as if it didn’t know it was dead yet, it kept running.\n\nas if the cold was a cruel anesthetic\n\nwe locked eyes, the second law granting this creature a momentary reprieve\n\nwhen its muscles twisted... a moiety of bone and bloody foam...\n\n...caught between forming a next stride and giving way to that incalculable force.\n\ni called you. i called for you.\n\nyou said you were never there for me and I apologized."},{"id":31,"slug":"string-quartet-1","title":"String Quartet No. 1","oneliner":"string quartet","description":"mnemonic-neumatic string quartet based on the phonemes of the Pledge of Allegiance. written for mivos quartet for VIPA.\n\ndescription: from Alexandra Teague’s America the Beautiful: Thriftstore, lines 10-20, 31-35\n\nfuzzy gloves with pom poms and pockets with real dimes for free\n\nand ticket subs to movies that sound like a good idea of your past–\n\nlike maybe that night got lost when this coat did and now you have your hands\n\nin its silk lining like you were born here in this America\n\nwhere everyone is safe as plastic tumblers and day-glo salad spinners\n\nand no one cares if you walk the aisles in two different shoes like the man\n\nin that children’s book with so many caps on caps on caps on his head\n\nyou remember no more story like “America the Beautiful”\n\nwas only ever purple mountains crayoned so hard the paper wrapping\n\nhad to be peeled back because patriotism meant sacrificing\n\nmonarchs and thrones and majesty and one color to rule them all\n\n...\n\nthat majesty of the already-gone but refillable like a bin of hats\n\nwhich maybe was the whole story how the man carried\n\nall of them with him like a country that erects monuments\n\nnot only for presidents but also for this-man-was-lynched-hereand-\n\nnow-there’s-a-swingset","audio":null,"pdf":null,"cues":[],"audioId":"wc-a31","one":"string quartet","onelinerEffective":"string quartet","descriptionEffective":"mnemonic-neumatic string quartet based on the phonemes of the Pledge of Allegiance. written for mivos quartet for VIPA.\n\ndescription: from Alexandra Teague’s America the Beautiful: Thriftstore, lines 10-20, 31-35\n\nfuzzy gloves with pom poms and pockets with
