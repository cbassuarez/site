<!doctype html>
<html data-skin="cards-tabs" data-ui-runtime="vanilla" data-theme="dark" data-palette="mono-bw" data-cursor="system" data-hover-effect="balanced-neo" data-button-effect="balanced-neo" data-brand-system="praetorius-v1" data-brand-attribution="on" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Praetorius - Cards Tabs Gallery</title>
  <meta name="prae-data-source" content="user">
</head>
<body class="prae-theme-dark prae-theme-dark" data-theme="dark" data-prae-banner>
  <header class="ct-header" role="banner">
    <div class="ct-header-left">
      <div class="ct-brand">
        <span class="ct-title" data-site-title>Praetorius</span>
        <span class="ct-subtitle" data-site-subtitle>Neo-Brutal Gallery</span>
      </div>
      <nav id="prae-nav" class="ct-nav" aria-label="Site"></nav>
    </div>
    <div class="ct-header-right">
      <button id="wc-theme-toggle" class="ct-theme-toggle" type="button" role="switch" aria-checked="false" aria-label="Toggle theme" title="Toggle theme">
        <span class="sr-only">Toggle theme</span>
      </button>
    </div>
  </header>

  <main class="ct-shell" role="main">
    <section class="ct-stage" aria-label="Portfolio stage">
      <div class="ct-stage-copy">
        <p class="ct-stage-kicker">Cards-Tabs 2026</p>
        <h1 class="ct-stage-title">Selected Works</h1>
        <p class="ct-stage-sub">Choose a work from the board to inspect details, cues, score, and playback controls.</p>
      </div>
      <aside id="ct-summary" class="ct-summary" aria-label="Portfolio summary"></aside>
    </section>

    <div class="ct-grid">
      <section class="ct-column ct-column-left" aria-label="Works board">
        <section id="works-console" class="ct-works" aria-label="Works list"></section>
      </section>

      <aside class="ct-column ct-column-right" aria-label="Inspector">
        <section id="ct-tabs" class="ct-tabs" aria-label="Work details">
          <div class="ct-tablist" role="tablist" aria-label="Work detail tabs">
            <button type="button" class="ct-tab" id="ct-tab-details" role="tab" data-tab="details" aria-selected="true" aria-controls="ct-panel-details" tabindex="0">Details</button>
            <button type="button" class="ct-tab" id="ct-tab-cues" role="tab" data-tab="cues" aria-selected="false" aria-controls="ct-panel-cues" tabindex="-1">Cues</button>
            <button type="button" class="ct-tab" id="ct-tab-playback" role="tab" data-tab="playback" aria-selected="false" aria-controls="ct-panel-playback" tabindex="-1">Playback</button>
            <button type="button" class="ct-tab" id="ct-tab-score" role="tab" data-tab="score" aria-selected="false" aria-controls="ct-panel-score" tabindex="-1">Score</button>
            <span class="ct-tab-indicator" aria-hidden="true"></span>
          </div>
          <div class="ct-tabpanels">
            <article id="ct-panel-details" class="ct-panel" role="tabpanel" tabindex="0" aria-labelledby="ct-tab-details"></article>
            <article id="ct-panel-cues" class="ct-panel" role="tabpanel" tabindex="0" aria-labelledby="ct-tab-cues" hidden></article>
            <article id="ct-panel-playback" class="ct-panel" role="tabpanel" tabindex="0" aria-labelledby="ct-tab-playback" hidden></article>
            <article id="ct-panel-score" class="ct-panel" role="tabpanel" tabindex="0" aria-labelledby="ct-tab-score" hidden></article>
          </div>
        </section>

        <aside id="ct-action-rail" class="ct-action-rail" aria-label="Action rail"></aside>
      </aside>
    </div>

    <div class="ct-backdrop" data-pdf-backdrop hidden></div>
    <aside class="ct-pdfpane vb-pdfpane" aria-label="Score PDF" aria-hidden="true" role="dialog" aria-modal="true">
      <header class="ct-pdfbar">
        <div class="ct-pdf-title vb-pdf-title" aria-live="polite"></div>
        <button type="button" class="ct-pdf-close vb-pdf-close" aria-label="Close PDF"></button>
      </header>
      <iframe class="ct-pdf-frame vb-pdf-frame" title="Score PDF" loading="lazy" allow="autoplay; fullscreen" referrerpolicy="no-referrer"></iframe>
    </aside>
  </main>

  <footer id="prae-footer" class="ct-footer" role="contentinfo"></footer>
