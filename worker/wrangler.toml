name = "seb-feed"
main = "src/index.ts"
compatibility_date = "2026-04-24"

[observability]
enabled = true

[vars]
TURNSTILE_ALLOWED_HOSTNAMES = "cbassuarez.com,www.cbassuarez.com"
CONTACT_FROM_EMAIL = "contact@cbassuarez.com"
CONTACT_FROM_NAME = "cbassuarez contact"

[[kv_namespaces]]
binding = "HITS_KV"
id = "5034b4f88e04478d84f90350268b5aa3"

[[send_email]]
name = "CONTACT_EMAIL"
destination_address = "contact@cbassuarez.com"

[triggers]
crons = ["*/5 * * * *"]

[[ratelimits]]
name = "RATE_LIMIT_FEED"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 30
  period = 60

[[ratelimits]]
name = "RATE_LIMIT_HIT"
namespace_id = "1002"

  [ratelimits.simple]
  limit = 5
  period = 60

[[ratelimits]]
name = "RATE_LIMIT_GUESTBOOK_POST"
namespace_id = "1003"

  [ratelimits.simple]
  limit = 3
  period = 60

[[ratelimits]]
name = "RATE_LIMIT_CONTACT_POST"
namespace_id = "1007"

  [ratelimits.simple]
  limit = 4
  period = 60

[[ratelimits]]
name = "RATE_LIMIT_STRING_PLUCK"
namespace_id = "1004"

  [ratelimits.simple]
  limit = 30
  period = 60

[[ratelimits]]
name = "RATE_LIMIT_STRING_GET"
namespace_id = "1005"

  [ratelimits.simple]
  limit = 120
  period = 60

[[ratelimits]]
name = "RATE_LIMIT_STRING_CURSOR"
namespace_id = "1006"

  [ratelimits.simple]
  limit = 80
  period = 60
